<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#2563eb">
  <title>{% block title %}BLEND PUNCH 셀러 카탈로그{% endblock %}</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: { extend: { fontFamily: { sans: ['Noto Sans KR', 'system-ui', 'sans-serif'] } } }
    }
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    [x-cloak] { display: none !important; }
    .line-clamp-2 { display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
    .line-clamp-3 { display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden; }
  </style>
</head>
<body class="bg-gray-50 min-h-screen font-sans text-gray-900 antialiased">

  <!-- ── Header ── -->
  <header class="bg-white border-b border-gray-100 sticky top-0 z-20 shadow-sm">
    <div class="max-w-6xl mx-auto px-4 sm:px-6 h-14 flex items-center justify-between">
      <a href="/catalog" class="flex items-center gap-2.5">
        <div class="w-8 h-8 bg-gradient-to-br from-blue-600 to-indigo-600 rounded-lg flex items-center justify-center flex-shrink-0">
          <span class="text-white font-bold text-xs">BP</span>
        </div>
        <div class="leading-tight">
          <div class="font-bold text-gray-900 text-sm">BLEND PUNCH</div>
          <div class="text-gray-400 text-xs hidden sm:block">셀러 카탈로그</div>
        </div>
      </a>
      <div class="flex items-center gap-3">
        {% block header_right %}{% endblock %}
        <a href="/catalog" class="text-xs text-gray-500 hover:text-gray-700 transition-colors">카탈로그 홈</a>
      </div>
    </div>
  </header>

  <!-- ── Main ── -->
  <main class="max-w-6xl mx-auto px-4 sm:px-6 py-6 sm:py-8">
    {% block content %}{% endblock %}
  </main>

  <!-- ── Footer ── -->
  <footer class="mt-12 border-t border-gray-100 bg-white">
    <div class="max-w-6xl mx-auto px-4 sm:px-6 py-6 flex flex-col sm:flex-row items-center justify-between gap-3">
      <div class="text-xs text-gray-400">© BLEND PUNCH · 공동구매 전문 벤더</div>
      <div class="text-xs text-gray-400">협업 문의는 담당 MD에게 연락해주세요</div>
    </div>
  </footer>

</body>
</html>
