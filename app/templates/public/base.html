<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}BLEND PUNCH 셀러 카탈로그{% endblock %}</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
</head>
<body class="bg-gray-50 min-h-screen">

  <!-- Top bar -->
  <header class="bg-white border-b border-gray-100 sticky top-0 z-10">
    <div class="max-w-6xl mx-auto px-6 h-14 flex items-center justify-between">
      <a href="/public/products" class="flex items-center gap-2.5">
        <div class="w-7 h-7 bg-gradient-to-br from-blue-600 to-indigo-600 rounded-lg flex items-center justify-center">
          <span class="text-white font-bold text-xs">BP</span>
        </div>
        <div>
          <span class="font-bold text-gray-900 text-sm">BLEND PUNCH</span>
          <span class="text-gray-400 text-xs ml-2">셀러 제품 카탈로그</span>
        </div>
      </a>
    </div>
  </header>

  <!-- Main content -->
  <main class="max-w-6xl mx-auto px-6 py-8">
    {% block content %}{% endblock %}
  </main>

</body>
</html>
