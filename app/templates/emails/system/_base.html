<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ subject }}</title>
  <style>
    body { margin: 0; padding: 0; background-color: #f9fafb; font-family: 'Apple SD Gothic Neo', 'Malgun Gothic', 'Noto Sans KR', sans-serif; }
    .wrapper { max-width: 560px; margin: 40px auto; background: #ffffff; border-radius: 12px; border: 1px solid #e5e7eb; overflow: hidden; }
    .header { background: #111827; padding: 28px 36px; text-align: center; }
    .header-brand { color: #9ca3af; font-size: 11px; font-weight: 700; letter-spacing: 0.15em; text-transform: uppercase; }
    .header-logo { display: inline-block; width: 40px; height: 40px; background: #1f2937; border-radius: 8px; margin: 12px auto 0; }
    .content { padding: 36px; }
    .greeting { font-size: 20px; font-weight: 700; color: #111827; margin: 0 0 8px; }
    .text { font-size: 14px; color: #6b7280; line-height: 1.7; margin: 0 0 24px; }
    .btn { display: inline-block; padding: 13px 28px; background: #111827; color: #ffffff !important; text-decoration: none; border-radius: 8px; font-size: 14px; font-weight: 600; }
    .btn-center { text-align: center; margin: 28px 0; }
    .divider { border: none; border-top: 1px solid #f3f4f6; margin: 28px 0; }
    .note { font-size: 12px; color: #9ca3af; line-height: 1.6; }
    .footer { background: #f9fafb; border-top: 1px solid #f3f4f6; padding: 20px 36px; text-align: center; }
    .footer-text { font-size: 11px; color: #9ca3af; margin: 0; }
    .link-fallback { word-break: break-all; font-size: 12px; color: #6b7280; background: #f3f4f6; border-radius: 6px; padding: 10px 14px; margin: 12px 0; }
  </style>
</head>
<body>
  <div class="wrapper">
    <div class="header">
      <div class="header-brand">BLEND PUNCH</div>
    </div>
    <div class="content">
      {% block body %}{% endblock %}
    </div>
    <div class="footer">
      <p class="footer-text">이 메일은 BLEND PUNCH OS에서 자동 발송된 메일입니다.<br>문의: admin@blendpunch.com</p>
    </div>
  </div>
</body>
</html>
