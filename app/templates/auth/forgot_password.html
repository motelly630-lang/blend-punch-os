<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>비밀번호 찾기 | BLEND PUNCH OS</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script>tailwind.config = { theme: { extend: { fontFamily: { sans: ['Noto Sans KR','system-ui','sans-serif'] } } } }</script>
</head>
<body class="bg-gray-50 font-sans antialiased min-h-screen flex items-center justify-center">
<div class="w-full max-w-sm px-4">
  <div class="text-center mb-8">
    <div class="text-xs font-bold text-gray-400 tracking-widest uppercase">BLEND PUNCH</div>
    <div class="text-gray-800 font-bold text-lg mt-1">비밀번호 찾기</div>
  </div>
  <div class="bg-white rounded-2xl shadow-sm border border-gray-100 p-8">
    {% if sent %}
    <div class="text-center py-4">
      <div class="w-12 h-12 bg-blue-100 rounded-full flex items-center justify-center mx-auto mb-4">
        <svg class="w-6 h-6 text-blue-600" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/>
        </svg>
      </div>
      <p class="text-sm font-medium text-gray-800 mb-1">메일을 발송했습니다</p>
      <p class="text-xs text-gray-500">{{ email }} 로 비밀번호 재설정 링크를 보냈습니다.<br>링크는 1시간 유효합니다.</p>
    </div>
    {% else %}
    <h1 class="text-base font-semibold text-gray-800 mb-2">비밀번호를 잊으셨나요?</h1>
    <p class="text-sm text-gray-500 mb-6">가입한 이메일 주소를 입력하면 재설정 링크를 보내드립니다.</p>
    <form method="post" action="/forgot-password" class="space-y-4">
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1.5">이메일</label>
        <input type="email" name="email" required autofocus placeholder="name@company.com"
          class="w-full px-3.5 py-2.5 border border-gray-200 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 transition">
      </div>
      <button type="submit"
        class="w-full py-2.5 bg-gray-900 text-white text-sm font-medium rounded-lg hover:bg-gray-700 transition-colors">
        재설정 링크 받기
      </button>
    </form>
    {% endif %}
  </div>
  <div class="mt-4 text-center">
    <a href="/login" class="text-sm text-blue-600 hover:text-blue-800">← 로그인으로 돌아가기</a>
  </div>
</div>
</body>
</html>
