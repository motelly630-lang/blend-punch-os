<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>회원가입 | BLEND PUNCH OS</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='7' fill='%23111827'/><path d='M19.5 4.5L9.5 17h7v10.5L26 15h-7z' fill='white'/></svg>">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>tailwind.config = { theme: { extend: { fontFamily: { sans: ['Noto Sans KR','system-ui','sans-serif'] } } } }</script>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body class="bg-gray-50 font-sans antialiased min-h-screen flex items-center justify-center py-10">
<div class="w-full max-w-sm px-4">

  <div class="text-center mb-8">
    <div class="inline-flex items-center justify-center mb-4">
      <img src="/static/logo.png" alt="BP" class="w-14 h-14 rounded-2xl object-contain shadow-sm"
           onerror="this.style.display='none'; document.getElementById('sv-logo').style.display='flex'">
      <div id="sv-logo" style="display:none"
           class="w-14 h-14 bg-gray-900 rounded-2xl items-center justify-center shadow-lg">
        <svg class="w-7 h-7 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M13 10V3L4 14h7v7l9-11h-7z"/>
        </svg>
      </div>
    </div>
    <div class="text-xs font-bold text-gray-400 tracking-widest uppercase">BLEND PUNCH</div>
    <div class="text-gray-800 font-bold text-lg mt-1">서비스 가입</div>
  </div>

  <div class="bg-white rounded-2xl shadow-sm border border-gray-100 p-8">
    <h1 class="text-base font-semibold text-gray-800 mb-6">새 계정 만들기</h1>

    {% if error %}
    <div class="mb-4 flex items-center gap-2 bg-red-50 border border-red-200 text-red-700 px-4 py-3 rounded-lg text-sm">
      <svg class="w-4 h-4 flex-shrink-0" fill="currentColor" viewBox="0 0 20 20">
        <path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zM8.707 7.293a1 1 0 00-1.414 1.414L8.586 10l-1.293 1.293a1 1 0 101.414 1.414L10 11.414l1.293 1.293a1 1 0 001.414-1.414L11.414 10l1.293-1.293a1 1 0 00-1.414-1.414L10 8.586 8.707 7.293z" clip-rule="evenodd"/>
      </svg>
      {{ error }}
    </div>
    {% endif %}

    <form method="post" action="/signup" class="space-y-4">
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1.5">회사명 <span class="text-red-400">*</span></label>
        <input type="text" name="company_name" value="{{ v_company or '' }}" required placeholder="예) 블렌드펀치"
          class="w-full px-3.5 py-2.5 border border-gray-200 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition">
      </div>
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1.5">이메일 <span class="text-red-400">*</span></label>
        <input type="email" name="email" value="{{ v_email or '' }}" required placeholder="name@company.com"
          autocomplete="email"
          class="w-full px-3.5 py-2.5 border border-gray-200 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition">
        <p class="text-xs text-gray-400 mt-1">가입 후 이메일 인증이 필요합니다</p>
      </div>
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1.5">비밀번호 <span class="text-red-400">*</span></label>
        <input type="password" name="password" required placeholder="8자 이상"
          autocomplete="new-password"
          class="w-full px-3.5 py-2.5 border border-gray-200 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition">
      </div>
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1.5">비밀번호 확인 <span class="text-red-400">*</span></label>
        <input type="password" name="password2" required placeholder="비밀번호 재입력"
          autocomplete="new-password"
          class="w-full px-3.5 py-2.5 border border-gray-200 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition">
      </div>
      <button type="submit"
        class="w-full py-2.5 bg-gray-900 text-white text-sm font-medium rounded-lg hover:bg-gray-700 transition-colors mt-2">
        가입하기
      </button>
    </form>
  </div>

  <div class="mt-4 text-center text-sm text-gray-500">
    이미 계정이 있으신가요?
    <a href="/login" class="text-blue-600 hover:text-blue-800 font-medium ml-1">로그인</a>
  </div>
</div>
</body>
</html>
