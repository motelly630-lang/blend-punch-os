<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>비밀번호 재설정 | BLEND PUNCH OS</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script>tailwind.config = { theme: { extend: { fontFamily: { sans: ['Noto Sans KR','system-ui','sans-serif'] } } } }</script>
</head>
<body class="bg-gray-50 font-sans antialiased min-h-screen flex items-center justify-center">
<div class="w-full max-w-sm px-4">
  <div class="text-center mb-8">
    <div class="text-xs font-bold text-gray-400 tracking-widest uppercase">BLEND PUNCH</div>
    <div class="text-gray-800 font-bold text-lg mt-1">새 비밀번호 설정</div>
  </div>
  <div class="bg-white rounded-2xl shadow-sm border border-gray-100 p-8">
    {% if error %}
    <div class="mb-4 text-sm text-red-600 bg-red-50 border border-red-200 px-4 py-3 rounded-lg">{{ error }}</div>
    {% endif %}
    <form method="post" action="/reset-password" class="space-y-4">
      <input type="hidden" name="token" value="{{ token }}">
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1.5">새 비밀번호</label>
        <input type="password" name="password" required autofocus placeholder="8자 이상"
          class="w-full px-3.5 py-2.5 border border-gray-200 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 transition">
      </div>
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1.5">비밀번호 확인</label>
        <input type="password" name="password2" required placeholder="비밀번호 재입력"
          class="w-full px-3.5 py-2.5 border border-gray-200 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 transition">
      </div>
      <button type="submit"
        class="w-full py-2.5 bg-gray-900 text-white text-sm font-medium rounded-lg hover:bg-gray-700 transition-colors">
        비밀번호 변경
      </button>
    </form>
  </div>
</div>
</body>
</html>
