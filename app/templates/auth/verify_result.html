<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>이메일 인증 | BLEND PUNCH OS</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script>tailwind.config = { theme: { extend: { fontFamily: { sans: ['Noto Sans KR','system-ui','sans-serif'] } } } }</script>
</head>
<body class="bg-gray-50 font-sans antialiased min-h-screen flex items-center justify-center">
<div class="w-full max-w-sm px-4 text-center">
  <div class="bg-white rounded-2xl shadow-sm border border-gray-100 p-10">
    {% if success %}
    <div class="w-14 h-14 bg-green-100 rounded-full flex items-center justify-center mx-auto mb-5">
      <svg class="w-7 h-7 text-green-600" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
        <path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7"/>
      </svg>
    </div>
    {% else %}
    <div class="w-14 h-14 bg-red-100 rounded-full flex items-center justify-center mx-auto mb-5">
      <svg class="w-7 h-7 text-red-500" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
        <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"/>
      </svg>
    </div>
    {% endif %}
    <p class="text-base font-semibold text-gray-800 mb-6">{{ message }}</p>
    <a href="/login"
      class="inline-block px-6 py-2.5 bg-gray-900 text-white text-sm font-medium rounded-lg hover:bg-gray-700 transition-colors">
      로그인하러 가기
    </a>
  </div>
</div>
</body>
</html>
