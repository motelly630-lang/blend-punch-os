<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>결제 실패 | BLEND PUNCH</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>body{font-family:'Noto Sans KR',sans-serif}</style>
</head>
<body class="bg-gray-50 min-h-screen flex items-center justify-center px-4">
  <div class="max-w-md w-full bg-white rounded-2xl shadow-sm border border-gray-100 p-8 text-center">
    <div class="w-16 h-16 bg-red-100 rounded-full flex items-center justify-center mx-auto mb-4">
      <svg class="w-8 h-8 text-red-500" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
        <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"/>
      </svg>
    </div>
    <h1 class="text-xl font-bold text-gray-900 mb-2">결제에 실패했습니다</h1>
    <p class="text-gray-500 text-sm mb-6">{{ message }}</p>
    <button onclick="history.back()"
      class="w-full py-3 bg-blue-600 text-white font-semibold rounded-xl hover:bg-blue-700 transition-colors">
      다시 시도하기
    </button>
  </div>
</body>
</html>
