<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>판매 대기중 | BLEND PUNCH</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>body{font-family:'Noto Sans KR',sans-serif}</style>
</head>
<body class="bg-gray-50 min-h-screen flex items-center justify-center px-4">
  <div class="max-w-md w-full bg-white rounded-2xl shadow-sm border border-gray-100 p-8 text-center">
    <div class="text-4xl mb-4">⏳</div>
    <h1 class="text-xl font-bold text-gray-900 mb-2">판매 대기중</h1>
    {% if page.starts_at %}
    <p class="text-gray-500 text-sm mb-1">판매 시작일</p>
    <p class="text-gray-800 font-semibold text-base mb-4">
      {{ page.starts_at.strftime('%Y년 %m월 %d일 %H:%M') }}
    </p>
    {% endif %}
    {% if product %}
    <p class="text-gray-400 text-sm">{{ product.name }}</p>
    {% endif %}
  </div>
</body>
</html>
