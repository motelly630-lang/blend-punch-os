{% extends "base.html" %}
{% block content %}
<div class="p-6 max-w-3xl mx-auto">
  <div class="flex items-center justify-between mb-6">
    <div class="flex items-center gap-3">
      <a href="/attendance?target_date={{ selected_date }}"
         class="text-gray-400 hover:text-white text-sm">← 출결 목록</a>
      <h1 class="text-xl font-bold text-white">{{ target.username }} 방문 로그</h1>
    </div>
    <form method="get" class="flex items-center gap-2">
      <input type="date" name="target_date"
             value="{{ selected_date }}"
             class="bg-gray-800 text-white text-sm px-3 py-2 rounded-lg border border-gray-700 focus:outline-none focus:border-blue-500">
      <button type="submit"
              class="px-4 py-2 bg-blue-600 text-white text-sm rounded-lg hover:bg-blue-700">
        조회
      </button>
    </form>
  </div>

  <div class="bg-gray-900 rounded-xl border border-gray-800 overflow-hidden">
    <table class="w-full text-sm">
      <thead>
        <tr class="border-b border-gray-800">
          <th class="text-left px-4 py-3 text-gray-400 font-medium w-32">시각</th>
          <th class="text-left px-4 py-3 text-gray-400 font-medium">경로</th>
        </tr>
      </thead>
      <tbody>
        {% for v in visits %}
        <tr class="border-b border-gray-800 hover:bg-gray-800/50">
          <td class="px-4 py-2.5 text-gray-400 whitespace-nowrap">
            {{ v.visited_at.strftime('%H:%M:%S') }}
          </td>
          <td class="px-4 py-2.5 text-gray-300 font-mono text-xs">
            {{ v.path }}
          </td>
        </tr>
        {% else %}
        <tr>
          <td colspan="2" class="px-4 py-10 text-center text-gray-600">
            {{ selected_date }} 방문 기록이 없습니다.
          </td>
        </tr>
        {% endfor %}
      </tbody>
    </table>
  </div>
  {% if visits %}
  <p class="text-gray-600 text-xs mt-2 text-right">총 {{ visits|length }}건</p>
  {% endif %}
</div>
{% endblock %}
